<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NB in town: Da Things</title>
  <link rel="icon" type="image/x-icon" href="/image/favicon.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
    
      background-image: url("image/8.1.dathings.png");
background-size: auto 50%;
      backdrop-filter: blur(5px);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;

    }

    .container {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      overflow: hidden;
      position: relative;
    }

    .page {
      display: none;
      padding: 24px;
      min-height: 300px;
    }

    .page.active {
      display: block;
    }

    /* ===== Page 1 ===== */
    .page1 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f8f8f8;
      border: 2px solid #ddd;
      border-radius: 8px;
      padding: 16px 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .page1:hover {
      border-color: #bbb;
      background: #fafafa;
    }

    .checkbox {
      width: 32px;
      height: 32px;
      border: 2px solid #999;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #4CAF50;
      background: white;
      transition: all 0.2s;
    }

    .checkbox.checked {
      background: #4CAF50;
      color: white;
      border-color: #4CAF50;
    }

    .checkbox.checked::after {
      content: "✓";
    }

    .text {
      font-size: 20px;
      font-weight: 500;
      color: #333;
      flex: 1;
      margin-left: 16px;
    }

    .title {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 10px;
      line-height: 1.1;
    }

    .recaptcha-logo {
      width: 60px;
      height: auto;
      opacity: 0.7;
    }

    .recaptcha-text {
      font-size: 12px;
      color: #666;
      text-align: right;
      margin-top: 4px;
    }

    /* ===== Page 2：绝对对齐关键 ===== */
    .captcha-body {
      max-width: 600px;
      margin: 0 auto;
    }

    .page2-header {
      padding: 16px 16px;
      background: #4285F4;
      color: white;
      font-size: 18px;
      font-weight: bold;
    }

    .instruction {
      font-size: 14px;
      display: flex;
      gap: 20px;
      font-weight: 350;
      margin-bottom: 5px;
      opacity: 1;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2px;
      padding: 5px 0px;
      background: white;
    }

    .grid-item {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      border: 2px solid transparent;
      background: #f5f5f5;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .grid-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .grid-item.selected {
      border-color: #4285F4;
      box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.3);
      transform: scale(0.95);
      transition: transform 0.2s ease;
    }

    .grid-item.selected::after {
      content: "✓";
      position: absolute;
      top: 4px;
      left: 4px;
      background: #4285F4;
      color: white;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: bold;
      z-index: 10;
    }

    .label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 6px 8px;
      font-size: 14px;
      text-align: center;
      transform: translateY(100%);
      transition: transform 0.3s ease;
      z-index: 5;
    }

    .grid-item.selected .label {
      transform: translateY(0);
    }

    .page2-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0px;
      background: #ffffff;
      border-top: 1px solid #eee;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #eee;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      cursor: pointer;
      transition: transform 1s ease;
    }

    .icon-btn:active {
  transform: rotate(180deg);
}

    .lets-go-btn {
      background: #4285F4;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      opacity: 0.6;
      pointer-events: none;
      transition: all 0.2s;
    }

    .lets-go-btn.enabled {
      opacity: 1;
      pointer-events: auto;
    }

    /* ===== Page 3 ===== */
    .page3 {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 200px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #eee;
      border-top: 4px solid #4285F4;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 16px;
      color: #666;
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Page 1 -->
  <div id="page1" class="page active">
    <div class="page1" id="checkmarkBox">
      <div class="checkbox" id="checkbox"></div>
      <div class="text">I'm not a human</div>
      <div>
        <img src="./image/icon.svg"
             alt="nbGAYTCHA" class="recaptcha-logo"/>
        <div class="recaptcha-text">nbGAYTCHA</div>
      </div>
    </div>
  </div>

  <!-- Page 2：已绝对对齐 -->
  <div id="page2" class="page">
    <div class="captcha-body">

      <div class="page2-header">
        <div class="instruction">Select all images with NB in town</div>
        <div class="title">drag things</div>
        <div class="instruction">
        <span>Sat 8.1</span>
        <span>Doors 22:00</span>
      </div>
      </div>

      <div class="grid-container" id="gridContainer"></div>

      <div class="page2-footer">
        <div class="icon-btn" id="refreshBtn" style="font-size: 20px;">↻</div>
        <button class="lets-go-btn" id="letsGoBtn">Let's go</button>
      </div>

    </div>
  </div>

  <!-- Page 3 -->
  <div id="page3" class="page">
    <div class="page3">
      <div class="spinner"></div>
      <div class="loading-text">Getting there...</div>
    </div>
  </div>

</div>

<script>
const CONFIG = {
  items: [
    { img: './image/unclewang.jpg', label: "Uncle Wang" },
    { img: './image/manikin.jpg',   label: "Manikin" },
    { img: './image/papa2.JPG',     label: "Papa Squat" },
    { img: './image/8og.JPG',       label: "8'OG" },
    { img: './image/kingfu.jpg',    label: "King Fu (FR)" },
    { img: './image/zaier.JPG',     label: "Zai‘Er" },
    { img: './image/lexi.jpg',      label: "DJ: <br> Sesbian Lex" },
    { img: './image/cnfbois.jpg',   label: "CN F-bois" },
    { img: './image/hunter.jpg',    label: "DJ: <br> Hunter Down" }
  ],
  tallyLink: 'https://tally.so/r/NpAkvN'
};

  let selectedItems = new Set();
  let currentPage = 1;

  const checkmarkBox = document.getElementById('checkmarkBox');
  const checkbox = document.getElementById('checkbox');
  const letsGoBtn = document.getElementById('letsGoBtn');
  const gridContainer = document.getElementById('gridContainer');
  const page1 = document.getElementById('page1');
  const page2 = document.getElementById('page2');
  const page3 = document.getElementById('page3');

  checkmarkBox.addEventListener('click', () => {
    if (!checkbox.classList.contains('checked')) {
      checkbox.classList.add('checked');
      setTimeout(() => {
        switchPage(2);
        generateGrid();
      }, 300);
    }
  });

  function generateGrid() {
  gridContainer.innerHTML = '';

  CONFIG.items.forEach((item, index) => {
    const div = document.createElement('div');
    div.className = 'grid-item';
    div.dataset.index = index;

    const img = document.createElement('img');
    img.src = item.img;
    img.alt = item.label;
    img.loading = 'lazy';

    const label = document.createElement('div');
    label.className = 'label';
    label.innerHTML = item.label;

    div.appendChild(img);
    div.appendChild(label);

    div.addEventListener('click', () => handleGridClick(index, div));
    gridContainer.appendChild(div);
  });
}
  function handleGridClick(index, element) {
    if (selectedItems.has(index)) {
      selectedItems.delete(index);
      element.classList.remove('selected');
    } else {
      selectedItems.add(index);
      element.classList.add('selected');
    }

    letsGoBtn.classList.toggle('enabled', selectedItems.size > 0);
  }

  letsGoBtn.addEventListener('click', () => {
    switchPage(3);
    setTimeout(() => {
      window.location.href = CONFIG.tallyLink;
    }, 1500);
  });

  function switchPage(pageNumber) {
    page1.classList.remove('active');
    page2.classList.remove('active');
    page3.classList.remove('active');
    if (pageNumber === 1) page1.classList.add('active');
    if (pageNumber === 2) page2.classList.add('active');
    if (pageNumber === 3) page3.classList.add('active');
    currentPage = pageNumber;
  }

//------刷新按钮
const refreshBtn = document.getElementById('refreshBtn');

refreshBtn.addEventListener('click', () => {
  // 清除所有选中状态
  document.querySelectorAll('.grid-item.selected').forEach(item => {
    item.classList.remove('selected');
  });

  // 清空选中记录
  selectedItems.clear();

  // 禁用按钮
  letsGoBtn.classList.remove('enabled');

//---------随机打乱
refreshBtn.addEventListener('click', () => {
  selectedItems.clear();
  letsGoBtn.classList.remove('enabled');

  // ✅ 整体打乱（图片 + tag 永远绑定）
  CONFIG.items.sort(() => Math.random() - 0.5);

  generateGrid();
});
});
</script>

</body>
</html>
